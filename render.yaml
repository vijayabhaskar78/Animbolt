databases:
  - name: animbolt-redis
    plan: free
    type: redis
    ipAllowList: []

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: animbolt-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          name: animbolt-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: SIMULATE_RENDER
        value: false
      - key: MAX_SCENE_DURATION_SEC
        value: 60
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      # Supabase S3-compatible storage
      - key: S3_BUCKET
        value: animbolt-artifacts
      - key: S3_ENDPOINT_URL
        value: https://lzeawbgggnrbhlqpvhxb.storage.supabase.co/storage/v1/s3
      - key: AWS_ACCESS_KEY_ID
        value: da9446d6f92b04951b93da3ea4872e60
      - key: AWS_REGION
        value: ap-northeast-2
      # ── Set these manually in Render dashboard ───────────────────────────
      # DATABASE_URL  → postgresql://postgres:<password>@db.lzeawbgggnrbhlqpvhxb.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET_KEY → python -c "import secrets; print(secrets.token_urlsafe(32))"
      - key: JWT_SECRET_KEY
        sync: false
      # GROQ_API_KEY → from console.groq.com
      - key: GROQ_API_KEY
        sync: false
      # AWS_SECRET_ACCESS_KEY → your Supabase S3 secret access key
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # EXTRA_CORS_ORIGINS → https://animbolt-web.onrender.com (set after web deploys)
      - key: EXTRA_CORS_ORIGINS
        sync: false

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: animbolt-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.workers.celery_app worker --loglevel=info -Q preview,export,default --concurrency=2
    envVars:
      - key: REDIS_URL
        fromService:
          name: animbolt-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: SIMULATE_RENDER
        value: false
      - key: MAX_SCENE_DURATION_SEC
        value: 60
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: S3_BUCKET
        value: animbolt-artifacts
      - key: S3_ENDPOINT_URL
        value: https://lzeawbgggnrbhlqpvhxb.storage.supabase.co/storage/v1/s3
      - key: AWS_ACCESS_KEY_ID
        value: da9446d6f92b04951b93da3ea4872e60
      - key: AWS_REGION
        value: ap-northeast-2
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: animbolt-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # NEXT_PUBLIC_API_BASE_URL → https://animbolt-api.onrender.com (set after API deploys)
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
