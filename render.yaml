services:
  - type: redis
    name: animbolt-redis
    plan: free
    ipAllowList: []

  # ── Backend API + Celery Worker (combined) ────────────────────────────────
  - type: web
    name: animbolt-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    dockerCommand: /app/start.sh
    envVars:
      - key: REDIS_URL
        fromService:
          name: animbolt-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: SIMULATE_RENDER
        value: false
      - key: MAX_SCENE_DURATION_SEC
        value: 60
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: S3_BUCKET
        value: animbolt-artifacts
      - key: S3_ENDPOINT_URL
        value: https://lzeawbgggnrbhlqpvhxb.storage.supabase.co/storage/v1/s3
      - key: AWS_ACCESS_KEY_ID
        value: da9446d6f92b04951b93da3ea4872e60
      - key: AWS_REGION
        value: ap-northeast-2
      # ── Set these in Render dashboard ────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: EXTRA_CORS_ORIGINS
        sync: false
